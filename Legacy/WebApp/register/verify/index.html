<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email | Night Watch</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="page-header">
    <a href="../../" class="logo-link">
      <img src="/assets/nightwatch_symbol.png" alt="Night Watch" class="logo-icon" />
    </a>
  </header>

  <canvas id="bg-canvas"></canvas>

  <div class="login-container">
    <div class="login-box">

      <h1 class="site-title glow-text">Verify Email</h1>
      <p class="site-subtitle">Complete your writer account</p>

      <div id="message-box" class="form-message"></div>

      <form class="login-form" id="verify-form">
        <p class="verify-copy">
          A verification code was sent to your email. Enter it below to finish joining the map.
        </p>

        <div class="input-group">
          <input type="email" name="email" id="email" placeholder="Email address" required autocomplete="email">
        </div>

        <div class="input-group">
          <input type="text" name="verification_code" id="verification_code" placeholder="6-digit code" maxlength="6" pattern="\d{6}" required>
        </div>

        <button type="submit" class="menu-btn login-btn">Verify Email</button>
      </form>

      <div class="login-footer">
        <a href="#" class="forgot-link" id="resend-code-link">Resend code</a>
        <a href="/register" class="forgot-link">← Back to Register</a>
      </div>

    </div>
  </div>

  <div class="footer-signature">
    <span class="swords">✦</span>
    <span class="glow-text">Night Watch Community</span>
    <span class="swords">✦</span>
  </div>

  <script src="/js/auth.js"></script>
  <script src="../animation.js"></script>
  <script src="verify.js"></script>
</body>
</html>
