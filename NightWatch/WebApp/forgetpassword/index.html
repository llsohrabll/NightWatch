<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <header class="page-header">
    <a href="../" class="logo-link">
      <img src="/assets/nightwatch_symbol.png" alt="Night Watch" class="logo-icon" />
    </a>
  </header>

  <canvas id="bg-canvas"></canvas>

  <div class="login-container">
    <div class="login-box">

      <h1 class="site-title glow-text">Recover Access</h1>
      <p class="site-subtitle">Find your way back</p>

      <div id="message-box" class="form-message"></div>

      <!-- STEP 1: Request Reset Code -->
      <form class="login-form" id="request-form">
        <h3 class="step-heading">Step 1: Enter Email</h3>
        
        <div class="input-group">
          <input type="email" name="email" id="request-email" placeholder="Enter your email" required>
        </div>

        <button type="submit" class="menu-btn login-btn">
          Send Reset Code
        </button>
      </form>

      <!-- STEP 2: Enter Code and New Password -->
      <form class="login-form is-hidden" id="reset-form">
        <h3 class="step-heading">Step 2: Reset Password</h3>
        
        <div class="input-group">
          <input type="text" name="email" id="reset-email" placeholder="Email" readonly>
        </div>

        <div class="input-group">
          <input type="text" name="reset_code" id="reset-code" placeholder="6-digit code from email" maxlength="6" pattern="\d{6}" required>
        </div>

        <div class="input-group">
          <input type="password" name="new_password" id="new-password" placeholder="New password (min 10 chars, upper/lower/number)" required>
        </div>

        <div class="input-group">
          <input type="password" name="confirm_password" id="confirm-password" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="menu-btn login-btn">
          Reset Password
        </button>

        <button type="button" class="menu-btn login-btn secondary-reset-btn" id="back-to-step1">
          Back to Step 1
        </button>
      </form>

      <div class="login-footer">
        <a href="/login" class="forgot-link">← Back to Login</a>
        <a href="/register" class="forgot-link">Don't have account? Register</a>
      </div>

    </div>
  </div>

  <div class="footer-signature">
    <span class="swords">✦</span>
    <span class="glow-text">Night Watch Community</span>
    <span class="swords">✦</span>
  </div>

  <script src="../js/auth.js"></script>
  <script src="animation.js"></script>
  <script src="app.js"></script>
</body>
</html>
