<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />

  <link rel="stylesheet" href="style.css">

  <!-- Cloudflare Turnstile (uncomment when ready) -->
  <!-- <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script> -->
</head>

<body>
  <header class="page-header">
    <a href="../" class="logo-link">
      <img src="/assets/nightwatch_symbol.png" alt="Night Watch" class="logo-icon" />
    </a>
  </header>

  <canvas id="bg-canvas"></canvas>

  <div class="login-container">
    <div class="login-box">

      <h1 class="site-title glow-text">Welcome Back</h1>
      <p class="site-subtitle">Enter the observatory</p>

      <div id="message-box" class="form-message"></div>

      <form class="login-form" id="login-form">

        <div class="input-group">
          <input type="text" name="username" id="username" placeholder="Username or email" required>
        </div>

        <div class="input-group">
          <input type="password" name="password" id="password" placeholder="Password" required>
        </div>

        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" name="remember_me" id="remember_me">
            <span class="checkbox-text">Keep me signed in for one week</span>
          </label>
        </div>

        <!-- <div class="cf-turnstile" data-sitekey="0x4AAAAAADAAtwU36LCe23pt"></div> -->

        <button type="submit" class="menu-btn login-btn">
          Authorise
        </button>

      </form>

      <div class="login-footer">
        <a href="/forgetpassword" class="forgot-link">Forgot password?</a>
        <a href="/register" class="forgot-link">Register</a>
      </div>

    </div>
  </div>

  <div class="footer-signature">
    <span class="swords">✦</span>
    <span class="glow-text">Night Watch Community</span>
    <span class="swords">✦</span>
  </div>

  <script src="../js/auth.js"></script>
  <script src="animation.js"></script>
  <script src="app.js"></script>
</body>
</html>
