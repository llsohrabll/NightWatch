<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="page-header">
    <a href="../" class="logo-link">
      <img src="/assets/nightwatch_symbol.png" alt="Night Watch" class="logo-icon" />
    </a>
  </header>

  <canvas id="bg-canvas"></canvas>

  <div class="login-container">
    <div class="login-box">

      <h1 class="site-title glow-text">Join the Map</h1>
      <p class="site-subtitle">Create your writer account</p>

      <div id="message-box" style="min-height: 24px; margin-bottom: 10px; color: #ff6b6b; text-align: center;"></div>

      <form class="login-form" id="register-form">
        <div class="input-group">
          <input type="text" name="username" id="username" placeholder="Username" required>
        </div>
        <div class="input-group">
          <input type="email" name="email" id="email" placeholder="Email" required>
        </div>
        <div class="input-group">
          <input type="password" name="password" id="password" placeholder="Password" required>
        </div>
        <div class="input-group">
          <input type="password" name="confirm_password" id="confirm_password" placeholder="Retype password" required>
        </div>

        <button type="submit" class="menu-btn login-btn">Register</button>
      </form>

      <div class="login-footer">
        <a href="/login" class="forgot-link">Already have an account?</a>
      </div>

    </div>
  </div>

  <div class="footer-signature">
    <span class="swords">✦</span>
    <span class="glow-text">Night Watch Community</span>
    <span class="swords">✦</span>
  </div>

  <script src="../js/auth.js"></script>
  <script src="animation.js"></script>
  <script>
    // ========================================================================
    // If this browser is already signed in, skip the registration form.
    (async function() {
      const session = await getSession();
      if (session) {
        // Send the user straight to the private panel.
        window.location.replace('/panel');
      }
    })();

    // ========================================================================
    // Send the registration form, then move to email verification on success.
    // ========================================================================
    document.getElementById('register-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;
      const messageBox = document.getElementById('message-box');
      messageBox.style.color = '#ff6b6b';
      messageBox.textContent = '';

      if (password !== confirmPassword) {
        messageBox.textContent = '❌ Passwords do not match';
        return;
      }

      const formData = new FormData(this);
      formData.delete('confirm_password');

      try {
        const response = await fetch('/functions/register.php', {
          method: 'POST',
          body: formData,
          credentials: 'same-origin'
        });

        const result = await response.json().catch(() => null);

        if (!response.ok || !result) {
          messageBox.textContent = '❌ ' + ((result && result.error) || 'Registration failed. Please try again.');
          return;
        }

        if (result.success) {
          messageBox.style.color = '#6bff9e';
          messageBox.textContent = result.message || '✅ Registration successful! Redirecting...';

          // Save the email locally so the verify page can prefill it.
          if (result.requires_email_verification) {
            sessionStorage.setItem('registration_email', email);
            if (result.user_id) {
              sessionStorage.setItem('registration_user_id', result.user_id);
            }
          }

          setTimeout(() => {
            window.location.replace(result.redirect || '/register/verify');
          }, 1000);
        } else {
          messageBox.textContent = '❌ ' + (result.error || 'Unknown error');
        }
      } catch (error) {
        messageBox.textContent = '❌ Network error, please try again.';
        console.error('Error:', error);
      }
    });
  </script>
</body>
</html>
