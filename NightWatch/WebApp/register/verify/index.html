<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email | Night Watch</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <header class="page-header">
    <a href="../../" class="logo-link">
      <img src="/assets/nightwatch_symbol.png" alt="Night Watch" class="logo-icon" />
    </a>
  </header>

  <canvas id="bg-canvas"></canvas>

  <div class="login-container">
    <div class="login-box">

      <h1 class="site-title glow-text">Verify Email</h1>
      <p class="site-subtitle">Complete your writer account</p>

      <div id="message-box" style="min-height: 24px; margin-bottom: 10px; color: #ff6b6b; text-align: center;"></div>

      <form class="login-form" id="verify-form">
        <p style="text-align: center; color: #aaa; margin-bottom: 20px;">
          A verification code was sent to your email. Enter it below to finish joining the map.
        </p>

        <div class="input-group">
          <input type="email" name="email" id="email" placeholder="Email address" required readonly style="cursor: not-allowed; opacity: 0.72;">
        </div>

        <div class="input-group">
          <input type="text" name="verification_code" id="verification_code" placeholder="6-digit code" maxlength="6" pattern="\d{6}" required>
        </div>

        <button type="submit" class="menu-btn login-btn">Verify Email</button>
      </form>

      <div class="login-footer">
        <a href="#" class="forgot-link" onclick="resendCode(event);">Resend code</a>
        <a href="/register" class="forgot-link">← Back to Register</a>
      </div>

    </div>
  </div>

  <div class="footer-signature">
    <span class="swords">✦</span>
    <span class="glow-text">Night Watch Community</span>
    <span class="swords">✦</span>
  </div>

  <script src="/js/auth.js"></script>
  <script src="../animation.js"></script>
  <script>
    // ========================================================================
    // If the browser already has a valid session, this page is no longer needed.
    // ========================================================================
    (async function() {
      const session = await getSession();
      if (session) {
        window.location.replace('/panel');
      }
    })();

    const messageBox = document.getElementById('message-box');
    const emailInput = document.getElementById('email');

    // ========================================================================
    // The register page stored the email in sessionStorage so this page can reuse it.
    const sessionEmail = sessionStorage.getItem('registration_email');
    const registrationUserId = sessionStorage.getItem('registration_user_id');

    if (!sessionEmail) {
      messageBox.style.color = '#ff6b6b';
      messageBox.textContent = '❌ Registration data not found. Please register again.';
      setTimeout(() => {
        window.location.replace('/register');
      }, 2000);
    } else {
      emailInput.value = sessionEmail;
    }

    // ========================================================================
    // Send the typed 6-digit code to the backend.
    // ========================================================================
    document.getElementById('verify-form').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email = emailInput.value;
      const verificationCode = document.getElementById('verification_code').value.trim();

      messageBox.style.color = '#ff6b6b';
      messageBox.textContent = '';

      // The backend checks this too, but early browser validation feels better.
      if (!/^\d{6}$/.test(verificationCode)) {
        messageBox.textContent = '❌ Verification code must be 6 digits.';
        return;
      }

      try {
        const formData = new FormData();
        formData.append('email', email);
        formData.append('verification_code', verificationCode);

        const response = await fetch('/functions/verify_email.php', {
          method: 'POST',
          body: formData,
          credentials: 'same-origin'
        });

        const result = await response.json().catch(() => null);

        if (!response.ok || !result) {
          messageBox.textContent = '❌ ' + ((result && result.error) || 'Verification failed. Please try again.');
          return;
        }

        if (result.success) {
          // Cleanup: the verify page no longer needs the saved registration data.
          sessionStorage.removeItem('registration_email');
          sessionStorage.removeItem('registration_user_id');

          messageBox.style.color = '#6bff9e';
          messageBox.textContent = '✅ ' + (result.message || 'Email verified successfully!');

          // After success, the backend session is already active.
          setTimeout(() => {
            window.location.replace(result.redirect || '/panel');
          }, 1500);
        } else {
          messageBox.textContent = '❌ ' + (result.error || 'Verification failed');
        }
      } catch (error) {
        messageBox.textContent = '❌ Network error, please try again.';
        console.error('Error:', error);
      }
    });

    // ========================================================================
    // Ask the backend to create and email a fresh verification code.
    // ========================================================================
    async function resendCode(event) {
      event.preventDefault();

      const email = emailInput.value;
      if (!email) {
        messageBox.style.color = '#ff6b6b';
        messageBox.textContent = '❌ Email not found.';
        return;
      }

      messageBox.style.color = '#ff6b6b';
      messageBox.textContent = '';

      messageBox.style.color = '#ffb700';
      messageBox.textContent = '⏳ Resending code...';

      try {
        const formData = new FormData();
        formData.append('email', email);

        const response = await fetch('/functions/resend_verification.php', {
          method: 'POST',
          body: formData,
          credentials: 'same-origin'
        });

        const result = await response.json().catch(() => null);
        if (!response.ok || !result || !result.success) {
          messageBox.style.color = '#ff6b6b';
          messageBox.textContent = '❌ ' + ((result && result.error) || 'Could not resend the code.');
          if (result && result.redirect) {
            setTimeout(() => window.location.replace(result.redirect), 1200);
          }
          return;
        }

        messageBox.style.color = '#6bff9e';
        messageBox.textContent = '✅ ' + (result.message || 'A fresh code has been sent.');
      } catch (error) {
        messageBox.style.color = '#ff6b6b';
        messageBox.textContent = '❌ Network error, please try again.';
        console.error('Error:', error);
      }
    }
  </script>
</body>
</html>
