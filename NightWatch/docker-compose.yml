services:
  web:
    build:
      context: .
      dockerfile: docker/apache/Dockerfile
    ports:
      - "8080:80"
    environment:
      NIGHTWATCH_DB_HOST: db
      NIGHTWATCH_DB_USER: nightwatch_app
      NIGHTWATCH_DB_PASSWORD: nightwatch_dev_password
      NIGHTWATCH_DB_NAME: NightWatchDB
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_ENCRYPTION: none
      SMTP_REQUIRE_AUTH: "0"
      MAIL_FROM_ADDRESS: noreply@nightwatch.local
      MAIL_FROM_NAME: NightWatch Dev
      NIGHTWATCH_PHOTO_STORAGE_DIR: /var/www/NightWatch/storage/photos
    volumes:
      - ./:/var/www/NightWatch
    depends_on:
      - db
      - mailpit

  db:
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: root_dev_password
      MARIADB_DATABASE: NightWatchDB
      MARIADB_USER: nightwatch_app
      MARIADB_PASSWORD: nightwatch_dev_password
    volumes:
      - db_data:/var/lib/mysql
      - ./DB/DB.sql:/docker-entrypoint-initdb.d/001_db.sql:ro

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"

volumes:
  db_data:
