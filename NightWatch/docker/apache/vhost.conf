<VirtualHost *:80>
    DocumentRoot /var/www/NightWatch/WebApp
    <Directory /var/www/NightWatch/WebApp>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
    <Directory /var/www/NightWatch/storage>
        Require all denied
    </Directory>
</VirtualHost>
