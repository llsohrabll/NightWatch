<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">

  <canvas id="bg-canvas"></canvas>

    <div class="login-box">

      <h1 class="site-title glow-text">Password Reset</h1>

      </div>

      <div class="login-footer">
        <a href="/login" class="forgot-link">Login</a>

    </div>
  </div>

  <div class="footer-signature">
    <span class="swords">⚔️</span>
    <span class="glow-text">Night Watch Team</span>
    <span class="swords">⚔️</span>
  </div>
