<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='75' font-size='80' text-anchor='middle' fill='%23b0c7e9' font-family='Arial, sans-serif'%3E❄%3C/text%3E%3C/svg%3E">

  <link rel="stylesheet" href="style.css">

  <!-- Cloudflare Turnstile -->
  <!-- <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script> -->
</head>

<body>

  <canvas id="bg-canvas"></canvas>

  <div class="login-container">
    <div class="login-box">

      <h1 class="site-title glow-text">LOGIN</h1>
      <p class="site-subtitle">USER ACCESS PANEL</p>

      <!-- فرم اصلی لاگین -->
      <form class="login-form" method="POST" action="/login">

        <div class="input-group">
          <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-group">
          <input type="password" name="password" placeholder="Password" required>
        </div>

        <!-- Cloudflare Turnstile CAPTCHA -->
        <!-- <div class="cf-turnstile" data-sitekey="0x4AAAAAADAAtwU36LCe23pt"></div> -->

        <button type="submit" class="menu-btn login-btn">
          Authorise
        </button>

      </form>

      <div class="login-footer">
        <a href="/forgetpassword" class="forgot-link">Forget Password?</a>
        <a href="/register" class="forgot-link">Register</a>
      </div>

    </div>
  </div>

  <div class="footer-signature">
    <span class="swords">⚔️</span>
    <span class="glow-text">Night Watch Team</span>
    <span class="swords">⚔️</span>
  </div>

  <script src="animation.js"></script>
</body>
</html>
